services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: forge
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forge_dev
    ports: ["5433:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge"]
      interval: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6380:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      retries: 5

  api:
    build:
      context: ./services/api
      dockerfile: ../deploy/docker/backend.Dockerfile
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: postgresql+asyncpg://forge:forge_dev@postgres:5432/forge
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-secret-change-in-production
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: https://dashscope.aliyuncs.com/compatible-mode/v1
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ./services/api/src:/app/src
      - ./contracts:/app/contracts
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  yjs:
    build:
      context: ./services/yjs
      dockerfile: ../deploy/docker/yjs-server.Dockerfile
    ports: ["1234:1234"]
    environment:
      DATABASE_URL: postgres://forge:forge_dev@postgres:5432/forge
      JWT_SECRET: dev-secret-change-in-production
    depends_on:
      postgres: { condition: service_healthy }

  web:
    build:
      context: ./services/web
      dockerfile: ../deploy/docker/frontend.Dockerfile
    ports: ["5173:5173"]
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_YJS_URL: ws://localhost:1234
    volumes:
      - ./services/web/src:/app/src
      - ./contracts:/app/contracts
    command: npm run dev -- --host

volumes:
  pgdata:
